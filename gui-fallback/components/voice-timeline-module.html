<div class="voice-timeline-module" data-voice-timeline-module>
  <div class="voice-timeline-module__metrics" data-vtm-metrics></div>
  <div class="voice-timeline-module__card voice-timeline-module__wave">
    <div class="voice-timeline-module__card-head">
      <span class="voice-timeline-module__card-title">Input Level and FSM Events</span>
      <div class="voice-timeline-module__tools">
        <span class="voice-timeline-module__meta" data-vtm-source></span>
        <button class="voice-timeline-module__icon-btn" type="button" data-vtm-pause aria-pressed="false" title="Pause timeline">Pause</button>
      </div>
    </div>
    <canvas width="1200" height="260" aria-label="Voice input timeline" data-vtm-canvas></canvas>
  </div>
  <div class="voice-timeline-module__states" aria-label="Voice timeline state list" data-vtm-states></div>
</div>

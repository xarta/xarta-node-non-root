<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprints Database Diagram</title>
  <link rel="stylesheet" href="database-diagram.css" />
  <link rel="stylesheet" href="../embed/blueprints-node-selector.css" />
</head>
<body>
  <header>
    <h1>Blueprints Database Diagram</h1>
    <blueprints-node-selector></blueprints-node-selector>
  </header>

  <main>
    <section class="panel">
      <div id="status" class="helper">Loading schema…</div>
      <p class="helper">Live Mermaid output from <code>/api/v1/schema</code>.</p>
    </section>

    <section class="panel">
      <h2>Relationships Summary</h2>
      <ul id="relationships" class="helper">
        <li>Loading…</li>
      </ul>
    </section>

    <section class="panel">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <h2 style="margin:0;">Mermaid Diagram</h2>
        <button id="copy-btn">Copy Mermaid</button>
        <span id="copied" class="helper"></span>
      </div>
      <div id="render-status" class="helper" style="margin-bottom:8px;">Rendering diagram…</div>
      <div id="mermaid-render" class="mermaid-render"></div>
      <pre id="mermaid-source">Loading…</pre>
    </section>
  </main>

  <script src="../embed/blueprints-auth.js"></script>
  <script src="../embed/blueprints-node-selector.js"></script>
  <script src="database-diagram.js"></script>
</body>
</html>

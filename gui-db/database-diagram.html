<!DOCTYPE html>
<html lang="en">
<head>
  {{$assetVersion := placeholder "http.vars.bp_asset_version"}}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprints Database Diagram</title>
  <link rel="stylesheet" href="database-diagram.css?v={{$assetVersion}}" />
  <link rel="stylesheet" href="../embed/blueprints-node-selector.css?v={{$assetVersion}}" />
</head>
<body>
  <header>
    <div class="header-inner">
      <blueprints-node-selector></blueprints-node-selector>
    </div>
  </header>

  <main>
    <h1 class="page-title">Blueprints Database Diagram</h1>

    <section class="panel">
      <div id="status" class="helper">Loading schema…</div>
      <p class="helper">Live Mermaid output from <code>/api/v1/schema</code>.</p>
    </section>

    <section class="panel">
      <h2>Relationships Summary</h2>
      <ul id="relationships" class="helper">
        <li>Loading…</li>
      </ul>
    </section>

    <section class="panel">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <h2 style="margin:0;">Mermaid Diagram</h2>
        <button id="copy-btn">Copy Mermaid</button>
        <span id="copied" class="helper"></span>
      </div>
      <div id="render-status" class="helper" style="margin-bottom:8px;">Rendering diagram…</div>
      <div id="mermaid-render" class="mermaid-render"></div>
      <pre id="mermaid-source">Loading…</pre>
    </section>
  </main>

  <script src="../embed/blueprints-auth.js?v={{$assetVersion}}"></script>
  <script src="database-pages.config.js?v={{$assetVersion}}"></script>
  <script src="../embed/blueprints-node-selector.js?v={{$assetVersion}}"></script>
  <script src="database-diagram.js?v={{$assetVersion}}"></script>
</body>
</html>

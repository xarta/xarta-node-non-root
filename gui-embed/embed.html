<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprints — Node Selector</title>
  <link rel="stylesheet" href="blueprints-node-selector.css" />
  <style>
    body {
      background: #0f1117;
      color: #e2e6f3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .demo-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 32px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    .demo-box h1 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .demo-box p  { font-size: 13px; color: #7b82a0; margin-bottom: 24px; }
    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #5b6080;
    }
  </style>
</head>
<body>

  <!--
    config.js sets window.BLUEPRINTS_API_BASE (and optionally BLUEPRINTS_SEED_NODES).
    Copy config.example.js → config.js and set your node URL before opening this file.
    config.js is gitignored.
  -->
  <script src="config.js" onerror="console.warn('config.js not found — set window.BLUEPRINTS_API_BASE manually or via seed nodes.')"></script>

  <div class="demo-box">
    <h1>&#9670; Blueprints</h1>
    <p>Node selector component demo</p>
    <blueprints-node-selector></blueprints-node-selector>
    <p class="hint">
      Click the selector above to switch between nodes.<br>
      Nodes are discovered automatically from the API.
    </p>
  </div>

  <script src="blueprints-auth.js"></script>
  <script src="blueprints-node-selector.js"></script>

</body>
</html>
